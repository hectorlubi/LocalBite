<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Local Bites</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="topbar">
    <button class="icon-btn" aria-label="toggle">
      <i class="fa-solid fa-toggle-off icon"></i>
    </button>

    <div class="brand">
      <div class="brand-name">Local <span>Bites</span></div>
    </div>

    <div class="filter-menu-wrap">
      <button class="icon-btn" aria-label="Filters" onclick="toggleFilterMenu()">
       <i class="fa-solid fa-filter icon"></i>
      </button>

      <div class="filter-menu" id="filterMenu">
        <div class="filter-group">
          <label for="distanceFilter">Distance</label>
          <select id="distanceFilter" onchange="applyFilters()">
            <option value="all">All distances</option>
            <option value="2">Within 2 km</option>
            <option value="5">Within 5 km</option>
            <option value="10">Within 10 km</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="cuisineFilter">Cuisine</label>
          <select id="cuisineFilter" onchange="applyFilters()">
            <option value="all">All cuisines</option>
            <option value="Fusion">Fusion</option>
            <option value="Comfort">Comfort</option>
            <option value="Steakhouse">Steakhouse</option>
            <option value="Brunch">Brunch</option>
          </select>
        </div>

        <button class="pill pill-strong filter-reset-btn" onclick="resetFilters()">Reset Filters</button>
      </div>
    </div>
  </header>

  <main class="app">
    <section class="deck-wrap">
      <div class="deck" id="cardStack"></div>
      <div id="chosenOverlay" class="chosen-overlay">
  <div class="chosen-overlay-card">
    <div class="chosen-banner" id="chosenTitle"></div>

    <div class="back-content">
      <div class="back-title" id="chosenName"></div>
      <div class="back-sub" id="chosenSub"></div>

      <div class="back-section">
        <div class="back-label">Contact</div>
        <div class="back-value" id="chosenContact"></div>
      </div>

      <div class="back-section">
        <div class="back-label">Address</div>
        <div class="back-value" id="chosenAddress"></div>
      </div>

      <div class="back-section">
        <div class="back-label">Hours</div>
        <div class="back-value" id="chosenHours"></div>
      </div>

      <div class="back-section">
        <div class="back-label">Website</div>
        <div class="back-value" id="chosenWebsite"></div>
      </div>

      <div class="tap-hint back-hint">Undo to go back</div>
    </div>
  </div>
</div>
      <div class="empty" id="emptyState">
        <div class="empty-title">No more restaurants</div>
        <div class="empty-sub">You swiped through everything in this deck.</div>
        <button class="pill pill-strong" onclick="resetDeck()">Start Over</button>
      </div>
    </section>

    <nav class="actions" aria-label="Swipe actions">
      <button id="undoBtn" class="action action-rewind" onclick="undoLastSwipe()" title="Undo">
  <i class="fa-solid fa-rotate-left action-ic"></i>
</button>

<button id="passBtn" class="action action-nope" onclick="swipe(false)" title="Pass">
  <i class="fa-solid fa-xmark action-ic"></i>
</button>

<button id="likeBtn" class="action action-like" onclick="swipe(true)" title="Like">
  <i class="fa-solid fa-heart action-ic"></i>
</button>
    </nav>
  </main>

  <div class="toast" id="toast"></div>

  <script src="script.js"></script>
</body>
</html>
